{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CustomiseMe UK</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black: #0a0a0a;
    --white: #f8f8f6;
    --grey-3: #4a4a4a;
    --grey-4: #888888;
    --grey-5: #b0b0b0;
    --grey-6: #d4d4d4;
    --accent: #c8a96e;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--black);
  }

  /* ── CURSOR ── */
  * { cursor: none; }
  #cursor {
    position: fixed; top: 0; left: 0;
    width: 10px; height: 10px;
    background: var(--white);
    border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width .2s, height .2s, background .2s;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    position: fixed; top: 0; left: 0;
    width: 36px; height: 36px;
    border: 1px solid rgba(248,248,246,0.5);
    border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width .35s cubic-bezier(.25,.46,.45,.94),
                height .35s cubic-bezier(.25,.46,.45,.94);
  }
  #cursor.hovering { width: 6px; height: 6px; }
  #cursor-ring.hovering { width: 56px; height: 56px; }

  /* ── VIDEO WRAPPER ── */
  .scene {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scale(1.04);
    animation: subtleZoom 18s ease-in-out infinite alternate;
  }
  @keyframes subtleZoom {
    from { transform: scale(1.04); }
    to   { transform: scale(1.10); }
  }


  /* ── CONTENT ── */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 40px;
    gap: 0;
  }

  /* CTA Button */
  .cta-wrap {
    opacity: 0;
    animation: fadeInUp 1s ease 1.5s forwards;
  }

  .enter-btn {
    position: relative;
    display: inline-flex; align-items: center; gap: 16px;
    padding: 18px 44px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--black);
    font-family: var(--sans);
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.28em; text-transform: uppercase;
    text-decoration: none;
    overflow: hidden;
  }

  /* Fill sweep on hover */
  .enter-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--white);
    transform: translateX(-101%);
    transition: transform .5s cubic-bezier(.76,0,.24,1);
    z-index: 0;
  }
  .enter-btn:hover::before { transform: translateX(0); }
  .enter-btn:hover { color: var(--black); }
  .enter-btn:hover .btn-arrow { transform: translateX(5px); }

  .btn-label { position: relative; z-index: 1; }
  .btn-arrow {
    position: relative; z-index: 1;
    display: flex; align-items: center;
    transition: transform .4s ease;
  }


  /* Page transition overlay */
  .transition-overlay {
    position: fixed; inset: 0; z-index: 9000;
    background: var(--black);
    transform: translateY(100%);
    transition: transform .8s cubic-bezier(.76,0,.24,1);
    pointer-events: none;
  }
  .transition-overlay.active {
    transform: translateY(0);
    pointer-events: all;
  }

  /* Keyframes */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Page transition overlay -->
<div class="transition-overlay" id="transitionOverlay"></div>


<div class="scene">

  <video
    id="bgVideo"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
    src="{% static 'cmuk-bg.mp4' %}"
  ></video>


    <div class="cta-wrap">
      <a href="{% url 'home-page' %}" class="enter-btn" id="enterBtn">
        <span class="btn-label">Enter Store</span>
        <span class="btn-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
      </a>
    </div>
  </div>

</div>

<script>
  // ── Custom cursor ──
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  });
  (function animateRing() {
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  })();

  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => { cur.classList.add('hovering'); ring.classList.add('hovering'); });
    el.addEventListener('mouseleave', () => { cur.classList.remove('hovering'); ring.classList.remove('hovering'); });
  });

  // ── Enter button: page transition ──
  const enterBtn = document.getElementById('enterBtn');
  const overlay  = document.getElementById('transitionOverlay');

  enterBtn.addEventListener('click', function(e) {
    e.preventDefault();
    const href = this.href;
    overlay.classList.add('active');
    setTimeout(() => { window.location.href = href; }, 820);
  });
</script>

</body>
</html>
