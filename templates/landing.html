{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CustomiseMe UK</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black: #0a0a0a;
    --white: #f8f8f6;
    --grey-3: #4a4a4a;
    --grey-4: #888888;
    --grey-5: #b0b0b0;
    --grey-6: #d4d4d4;
    --accent: #c8a96e;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--black);
  }

  /* ── CURSOR ── */
  * { cursor: none; }
  #cursor {
    position: fixed; top: 0; left: 0;
    width: 10px; height: 10px;
    background: var(--white);
    border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width .2s, height .2s, background .2s;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    position: fixed; top: 0; left: 0;
    width: 36px; height: 36px;
    border: 1px solid rgba(248,248,246,0.5);
    border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width .35s cubic-bezier(.25,.46,.45,.94),
                height .35s cubic-bezier(.25,.46,.45,.94);
  }
  #cursor.hovering { width: 6px; height: 6px; }
  #cursor-ring.hovering { width: 56px; height: 56px; }

  /* ── VIDEO WRAPPER ── */
  .scene {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(30%) brightness(0.55);
    transform: scale(1.04);
    animation: subtleZoom 18s ease-in-out infinite alternate;
  }
  @keyframes subtleZoom {
    from { transform: scale(1.04); }
    to   { transform: scale(1.10); }
  }

  /* ── GRAIN OVERLAY ── */
  .grain {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    animation: grainShift 0.8s steps(2) infinite;
  }
  @keyframes grainShift {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-3px, 2px); }
    50%  { transform: translate(2px, -2px); }
    75%  { transform: translate(-1px, 3px); }
    100% { transform: translate(3px, -1px); }
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: absolute; inset: 0; z-index: 2;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.35) 70%,
      rgba(0,0,0,0.75) 100%);
    pointer-events: none;
  }

  /* ── CONTENT ── */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 40px;
    gap: 0;
  }

  /* Top rule */
  .top-rule {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, rgba(248,248,246,0.4));
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.3s forwards;
  }

  /* Overline */
  .overline {
    font-family: var(--sans);
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.6s forwards;
  }

  /* Main title */
  .brand-name {
    font-family: var(--serif);
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeInUp 1.1s ease 0.85s forwards;
  }
  .brand-name em {
    font-style: italic;
    color: rgba(248,248,246,0.65);
  }

  /* Subtitle */
  .tagline {
    font-family: var(--serif);
    font-size: clamp(15px, 2vw, 19px);
    font-weight: 300;
    font-style: italic;
    color: rgba(248,248,246,0.5);
    letter-spacing: 0.06em;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeInUp 1s ease 1.1s forwards;
  }

  /* Horizontal ornament */
  .ornament {
    display: flex; align-items: center; gap: 18px;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeInUp 1s ease 1.3s forwards;
  }
  .ornament-line {
    width: 48px; height: 1px;
    background: rgba(200,169,110,0.4);
  }
  .ornament-diamond {
    width: 5px; height: 5px;
    border: 1px solid var(--accent);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  /* CTA Button */
  .cta-wrap {
    opacity: 0;
    animation: fadeInUp 1s ease 1.5s forwards;
  }

  .enter-btn {
    position: relative;
    display: inline-flex; align-items: center; gap: 16px;
    padding: 18px 44px;
    background: transparent;
    border: 1px solid rgba(248,248,246,0.25);
    color: var(--white);
    font-family: var(--sans);
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.28em; text-transform: uppercase;
    text-decoration: none;
    overflow: hidden;
    transition: border-color .4s ease, color .4s ease;
  }

  /* Fill sweep on hover */
  .enter-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--white);
    transform: translateX(-101%);
    transition: transform .5s cubic-bezier(.76,0,.24,1);
    z-index: 0;
  }
  .enter-btn:hover::before { transform: translateX(0); }
  .enter-btn:hover { color: var(--black); border-color: var(--white); }
  .enter-btn:hover .btn-arrow { transform: translateX(5px); }

  .btn-label { position: relative; z-index: 1; }
  .btn-arrow {
    position: relative; z-index: 1;
    display: flex; align-items: center;
    transition: transform .4s ease;
  }

  /* Bottom info strip */
  .bottom-strip {
    position: absolute;
    bottom: 40px; left: 0; right: 0;
    z-index: 10;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 48px;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
  }

  .strip-left {
    font-family: var(--sans);
    font-size: 10px; font-weight: 400;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(248,248,246,0.3);
    line-height: 1.9;
  }
  .strip-left span {
    display: block;
    color: rgba(248,248,246,0.18);
    font-size: 9px;
  }

  .strip-right {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 6px;
  }
  .scroll-indicator {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--sans);
    font-size: 9px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(248,248,246,0.28);
  }
  .scroll-line {
    width: 32px; height: 1px;
    background: rgba(248,248,246,0.2);
    position: relative; overflow: hidden;
  }
  .scroll-line::after {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: rgba(248,248,246,0.6);
    animation: scrollPulse 2.2s ease-in-out infinite;
  }
  @keyframes scrollPulse {
    0%   { left: -100%; }
    50%  { left: 0; }
    100% { left: 100%; }
  }

  /* Corner marks */
  .corner {
    position: absolute; z-index: 10;
    width: 22px; height: 22px;
    opacity: 0;
    animation: fadeIn 1s ease 1.8s forwards;
  }
  .corner--tl { top: 28px; left: 28px; border-top: 1px solid rgba(248,248,246,0.2); border-left: 1px solid rgba(248,248,246,0.2); }
  .corner--tr { top: 28px; right: 28px; border-top: 1px solid rgba(248,248,246,0.2); border-right: 1px solid rgba(248,248,246,0.2); }
  .corner--bl { bottom: 28px; left: 28px; border-bottom: 1px solid rgba(248,248,246,0.2); border-left: 1px solid rgba(248,248,246,0.2); }
  .corner--br { bottom: 28px; right: 28px; border-bottom: 1px solid rgba(248,248,246,0.2); border-right: 1px solid rgba(248,248,246,0.2); }

  /* Mute button */
  .mute-btn {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 11;
    background: none; border: 1px solid rgba(248,248,246,0.18);
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(248,248,246,0.4);
    transition: border-color .3s, color .3s;
    opacity: 0;
    animation: fadeIn 1s ease 2.2s forwards;
  }
  .mute-btn:hover { border-color: rgba(248,248,246,0.5); color: var(--white); }

  /* Page transition overlay */
  .transition-overlay {
    position: fixed; inset: 0; z-index: 9000;
    background: var(--black);
    transform: translateY(100%);
    transition: transform .8s cubic-bezier(.76,0,.24,1);
    pointer-events: none;
  }
  .transition-overlay.active {
    transform: translateY(0);
    pointer-events: all;
  }

  /* Keyframes */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Mobile */
  @media (max-width: 640px) {
    .bottom-strip { padding: 0 24px; bottom: 28px; }
    .strip-left { display: none; }
    .corner--tl { top: 20px; left: 20px; }
    .corner--tr { top: 20px; right: 20px; }
    .corner--bl { bottom: 20px; left: 20px; }
    .corner--br { bottom: 20px; right: 20px; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Page transition overlay -->
<div class="transition-overlay" id="transitionOverlay"></div>

<!-- Corner marks -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="scene">

  <video
    id="bgVideo"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
    src="{% static 'cmuk-bg.mp4' %}"
  ></video>

  <div class="grain"></div>
  <div class="vignette"></div>

  <!-- Main content -->
  <div class="content">
    <div class="top-rule"></div>

    <div class="overline">Est. London &nbsp;·&nbsp; Handcrafted</div>

    <h1 class="brand-name">
      Customise<em>Me</em>
    </h1>

    <p class="tagline">Every piece, a story only you can tell.</p>

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>

    <div class="cta-wrap">
      <a href="{% url 'home-page' %}" class="enter-btn" id="enterBtn">
        <span class="btn-label">Enter the Collection</span>
        <span class="btn-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
      </a>
    </div>
  </div>

  <!-- Bottom strip -->
  <div class="bottom-strip">
    <div class="strip-left">
      CustomiseMe UK
      <span>Personalised gifts &amp; homeware</span>
    </div>
    <div class="strip-right">
      <div class="scroll-indicator">
        <div class="scroll-line"></div>
        UK &nbsp;&middot;&nbsp; Free shipping over £100
      </div>
    </div>
  </div>

  <!-- Mute toggle -->
  <button class="mute-btn" id="muteBtn" aria-label="Toggle sound" title="Toggle sound">
    <svg id="muteIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </button>

</div>

<script>
  // ── Custom cursor ──
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  });
  (function animateRing() {
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  })();

  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => { cur.classList.add('hovering'); ring.classList.add('hovering'); });
    el.addEventListener('mouseleave', () => { cur.classList.remove('hovering'); ring.classList.remove('hovering'); });
  });

  // ── Mute toggle ──
  const video   = document.getElementById('bgVideo');
  const muteBtn = document.getElementById('muteBtn');
  const muteIcon = document.getElementById('muteIcon');

  const soundOnSVG  = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>`;
  const soundOffSVG = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;

  muteBtn.addEventListener('click', () => {
    video.muted = !video.muted;
    muteIcon.innerHTML = video.muted ? soundOffSVG : soundOnSVG;
  });

  // ── Enter button: page transition ──
  const enterBtn = document.getElementById('enterBtn');
  const overlay  = document.getElementById('transitionOverlay');

  enterBtn.addEventListener('click', function(e) {
    e.preventDefault();
    const href = this.href;
    overlay.classList.add('active');
    setTimeout(() => { window.location.href = href; }, 820);
  });
</script>

</body>
</html>
